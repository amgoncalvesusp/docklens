name: Build standalone executables

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach binaries to the GitHub release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: DockLens-windows-x86_64.exe
            binary: dist/DockLens.exe
          - os: ubuntu-latest
            asset: DockLens-linux-x86_64
            binary: dist/DockLens
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Qt/xcb runtime libs (for PyInstaller bundling)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run backend tests
        run: python tests/test_pipeline.py
        continue-on-error: true

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --onefile --windowed --name DockLens
          --exclude-module scipy --exclude-module rdkit
          --exclude-module matplotlib --exclude-module tkinter
          --exclude-module IPython --exclude-module pytest
          run_docklens.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary }}" "out/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
